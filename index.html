<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>One-Tap Drift</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header>
      <h1>One-Tap Drift</h1>
      <p>Hold to drift. Release to straighten. Avoid the barriers.</p>
    </header>

    <section class="hud" aria-label="Game stats">
      <div>Score: <strong id="score">0</strong></div>
      <div>Best: <strong id="best">0</strong></div>
    </section>

    <canvas id="game" width="360" height="640" aria-label="One-Tap Drift game canvas"></canvas>

    <button id="startButton">Start game</button>
  </main>

  <script src="game.js"></script>
</body>
</html>
