<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Top-Down Golf Prototype</title>
  <link rel="stylesheet" href="style.css?v=round068" />
  <link rel="stylesheet" href="ui-layout-fix.css?v=round068" />
</head>
<body>
  <main class="app-shell">
    <header class="top-panel">
      <div>
        <p class="eyebrow" id="holeLabel">Hole 1 · Par 4</p>
        <h1>Top-Down Golf</h1>
        <p class="sub">Pull back from the ball, release to lock aim and power, then tap the moving strike marker in the green zone.</p>
      </div>
      <div class="score-card">
        <span>Strokes</span>
        <strong id="strokes">0</strong>
      </div>
    </header>

    <section class="status-grid" aria-label="Shot status">
      <div><span>Lie</span><strong id="lie">Tee</strong></div>
      <div><span>Club</span><strong id="club">Driver</strong></div>
      <div><span>Pin</span><strong id="distance">0 yd</strong></div>
      <div><span>Power</span><strong id="power">0%</strong></div>
    </section>

    <canvas id="course" width="420" height="760" aria-label="Playable top-down golf course"></canvas>

    <section class="club-panel" aria-label="Golf bag club selection">
      <button data-club="driver" class="selected">Driver</button>
      <button data-club="wood3">3W</button>
      <button data-club="iron5">5I</button>
      <button data-club="iron7">7I</button>
      <button data-club="wedgeP">PW</button>
      <button data-club="wedgeS">SW</button>
      <button data-club="putter">Putter</button>
    </section>

    <section class="actions">
      <button id="resetShot" type="button">Reset ball</button>
      <button id="newHole" type="button">Restart hole</button>
    </section>

    <p class="hint" id="hint">Pull back from the ball, release to lock aim and power, then tap the moving strike marker in the green zone.</p>
  </main>

  <script src="shared.js?v=round068"></script>
  <script src="hole-data.js?v=round068"></script>
  <script src="props.js?v=round068"></script>
  <script src="surface-rendering.js?v=liefix1"></script>
  <script src="slope-v034.js?v=round068"></script>
  <!-- Stage A: engine-core.js replaces game.js + active-tuning.js + putting-physics-v027.js + shot-shape-v031.js -->
  <script src="engine-core.js?v=stageA6"></script>
  <!-- Slope rethink: real green height-field break model (overrides getGreenSlopeAt) -->
  <script src="slope-field.js?v=slope5"></script>
  <script src="ui-polish.js?v=round068"></script>
  <!-- Redesigned swing/timing meter -->
  <script src="swing-meter.js?v=meter1"></script>
  <script src="version-badge.js?v=round068"></script>
  <!-- Stage B: round-core.js replaces round-v035.js and folds in round-v036.js's par-3 hole data -->
  <script src="round-core.js?v=stageB"></script>

  <script src="round-v037.js?v=round068"></script>

  <script src="round-v041.js?v=round068"></script>
  <script src="round-v042.js?v=round068"></script>
  <script src="round-v043.js?v=round068"></script>

  <script src="course-menu-v045.js?v=round068"></script>
  <script src="courses-v046.js?v=palmfix2"></script>
  <!-- 5 new 18-hole courses: desert, moor, moon, mars, sky -->

  <script src="course-detail.js?v=detail3"></script>

  <script src="slope-read.js?v=slope8"></script>

  <script src="tree-sway.js?v=sway1"></script>
  <!-- pitch marks & divots -->
  <script src="ground-marks.js?v=marks1"></script>
  <!-- cinematic hole intro flyover + cart/sprinklers -->
  <script src="hole-intro.js?v=intro2"></script>
  <!-- hit-quality flash + score-name celebration -->
