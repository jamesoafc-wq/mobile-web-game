<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Top-Down Golf Prototype</title>
  <link rel="stylesheet" href="style.css?v=size-roll-fix-1" />
</head>
<body>
  <main class="app-shell">
    <header class="top-panel">
      <div>
        <p class="eyebrow" id="holeLabel">Hole 1 · Par 4</p>
        <h1>Top-Down Golf</h1>
        <p class="sub">Pull back to aim, then tap the strike bar. Read the green and pace your putts.</p>
      </div>
      <div class="score-card">
        <span>Strokes</span>
        <strong id="strokes">0</strong>
      </div>
    </header>

    <section class="status-grid" aria-label="Shot status">
      <div><span>Lie</span><strong id="lie">Tee</strong></div>
      <div><span>Club</span><strong id="club">Driver</strong></div>
      <div><span>Pin</span><strong id="distance">0 yd</strong></div>
      <div><span>Power</span><strong id="power">0%</strong></div>
    </section>

    <canvas id="course" width="420" height="760" aria-label="Playable top-down golf course"></canvas>

    <section class="club-panel" aria-label="Golf bag club selection">
      <button data-club="driver" class="selected">Driver</button>
      <button data-club="wood3">3W</button>
      <button data-club="iron5">5I</button>
      <button data-club="iron7">7I</button>
      <button data-club="wedgeP">PW</button>
      <button data-club="wedgeS">SW</button>
      <button data-club="putter">Putter</button>
    </section>

    <section class="actions">
      <button id="resetShot" type="button">Reset ball</button>
      <button id="newHole" type="button">Restart hole</button>
    </section>

    <p class="hint" id="hint">Pull back from the ball, release to lock aim and power, then tap the moving strike marker in the green zone.</p>
  </main>

  <script src="shared.js?v=size-roll-fix-1"></script>
  <script src="hole-data.js?v=size-roll-fix-1"></script>
  <script src="props.js?v=size-roll-fix-1"></script>
  <script src="surface-rendering.js?v=size-roll-fix-1"></script>
  <script src="game.js?v=size-roll-fix-1"></script>
</body>
</html>
